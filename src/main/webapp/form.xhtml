<ui:component xmlns="http://www.w3.org/1999/xhtml"
              xmlns:h="http://xmlns.jcp.org/jsf/html"
              xmlns:f="http://xmlns.jcp.org/jsf/core"
              xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
              xmlns:p="http://primefaces.org/ui">

    <h:form id="formProducto">

        <div class="field grid">
            <p:outputLabel value="#{msg['producto.nombre']}" for="nombre" class="p-col-fixed"
                           style="width:200px"/>

            <div class="col">
                <p:inputText id="nombre"
                             value="#{productoController.producto.nombre}"
                             label="Nombre"/>
            </div>

            <div class="col">
                <p:message for="nombre" style="color: red;"/>
            </div>

        </div>

        <div class="field grid">
            <p:outputLabel value="#{msg['producto.precio']}" for="precio" class="p-col-fixed"
                           style="width:200px"/>

            <div class="col">
                <p:inputText id="precio"
                             value="#{productoController.producto.precio}"
                             label="Precio"/>
            </div>

            <div class="col">
                <p:message for="precio" style="color: red;"/>
            </div>

        </div>

        <div class="field grid">
            <p:outputLabel value="#{msg['producto.sku']}" for="sku" class="p-col-fixed" style="width:200px"/>

            <div class="col">
                <p:inputText id="sku"
                             value="#{productoController.producto.sku}"
                             label="Sku"/>
            </div>

            <div class="col">
                <p:message for="sku" style="color: red;"/>
            </div>

        </div>

        <div class="field grid">
            <p:outputLabel value="#{msg['producto.fechaRegistro']}" for="fechaRegistro" class="p-col-fixed"
                           style="width:200px"/>

            <div class="col">
                <p:datePicker id="fechaRegistro"
                              value="#{productoController.producto.fechaRegistro}"
                              label="Fecha Registro"
                              pattern="yyyy-MM-dd"
                              converterMessage="Indique la fecha con yyyy-mm-dd">
                    <f:convertDateTime type="localDate" pattern="yyyy-MM-dd"/>
                    <f:passThroughAttribute name="type" value="Date"/>
                </p:datePicker>
            </div>

            <div class="col">
                <p:message for="fechaRegistro" style="color: red;"/>
            </div>

        </div>

        <div class="field grid">
            <p:outputLabel value="#{msg['producto.categoria']}" for="categorias" class="p-col-fixed"
                           style="width:200px"/>

            <div class="col">
                <p:selectOneMenu id="categorias" value="#{productoController.producto.categoria}">
                    <f:selectItem itemLabel="--- Seleccione la Categoría --" itemValue="#{null}"/>
                    <f:selectItems value="#{categorias}" var="c" itemLabel="#{c.nombre}"/>
                    <f:converter binding="#{categoriaConverter}"/>
                </p:selectOneMenu>
            </div>

            <div class="col">
                <p:message for="categorias" style="color: red;"/>
            </div>

        </div>

        <div class="field grid">

            <div class="col">
                <p:commandButton
                        value="#{productoController.producto.id > 0 ? msg['producto.boton.editar']:msg['producto.boton.crear']}"
                        action="#{productoController.guardar}"
                        class="ui-button-outlined ui-button-success"
                        update="@form tabla"/>
            </div>

            <h:inputHidden value="productoController.producto.id"/>
        </div>

    </h:form>

</ui:component>
